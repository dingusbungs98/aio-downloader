---
name: direct-downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Enter the Direct Download URL'
        required: true

jobs:
  actions:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2

      - name: Download File (aria2)
        id: dl
        run: |
          URL="${{ github.event.inputs.url }}"
          mkdir -p files-downloaded
          aria2c -x 16 -s 16 -d files-downloaded --console-log-level=warn --summary-interval=10 "$URL"
          
          # Get the filename
          FILENAME=$(ls -1 files-downloaded | head -n1)
          echo "FILENAME=$FILENAME" >> $GITHUB_OUTPUT

      - name: Split and Zip (with direct-content folder inside)
        run: |
          FILENAME="${{ steps.dl.outputs.FILENAME }}"
          mkdir -p direct

          # Create the structure: direct-content/FILENAME
          mkdir -p tmpzip/direct-content
          cp "files-downloaded/${FILENAME}" "tmpzip/direct-content/"

          # Zip from inside tmpzip so the archive contains the direct-content folder
          cd tmpzip
          zip -s 99m "../direct/${FILENAME}.zip" -r "direct-content"
          cd ..

          # Clean up temporary folder
          rm -rf tmpzip

      - name: Upload to direct folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          if [ -z "$(ls -A direct/)" ]; then
            echo "No files to upload."
            exit 0
          fi

          git add direct/
          git commit -m "Add: ${{ steps.dl.outputs.FILENAME }} [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                sleep 3
              else
                exit 1
              fi
            fi
          done
